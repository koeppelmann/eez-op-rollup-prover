[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc = "0.8.34"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "prague"

# Match the canonical sync-rollups-v2 build so bytecode is reproducible
# and Blockscout verification succeeds against the same metadata hash.

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
quote_style = "double"

[etherscan]
chiado = { key = "any", url = "https://gnosis-chiado.blockscout.com/api/" }
